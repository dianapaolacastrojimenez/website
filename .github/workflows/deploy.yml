jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Herramienta actualizada a la versión 4
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Herramienta actualizada a v4 y entorno a Node 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm install

      # 4. Construir el sitio
      - name: Construir el sitio estático
        run: npm run build
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          
      # (Mantenga aquí sus pasos de FTP para subir a Hostinger tal como los tenía)
